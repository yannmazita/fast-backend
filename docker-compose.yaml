x-postgres-base: &postgres-base
  image: postgres:18.4-alpine
  healthcheck:
    test:
      - CMD-SHELL
      - pg_isready -U postgres
    interval: 10s
    timeout: 5s
    retries: 5

services:
  postgres-dev:
    profiles: ["dev"]
    <<: *postgres-base
    env_file: "./.env"
    ports:
      - 5432:5432
    expose:
      - 5432
    volumes:
      - ./postgres/docker-entrypoint-initdb.d/:/docker-entrypoint-initdb.d/
      - pgdata-dev:/var/lib/postgresql
    networks:
      - dev

volumes:
  pgdata-dev:
  pgdata-prod:

networks:
  dev:
