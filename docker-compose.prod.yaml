# ./docker-compose.prod.yaml
version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    env_file:
      - ./.env.prod
    ports:
      - "8080:8080"
    depends_on:
      postgres-prod:
        condition: service_healthy
    networks:
      - prod

  postgres-prod:
    image: postgres:18.4-alpine
    restart: always
    env_file:
      - ./.env.prod
    volumes:
      - pgdata-prod:/var/lib/postgresql/
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod

volumes:
  pgdata-prod:

networks:
  prod:
